{% extends "base.html" %}
{% block title %}分类管理 - 管理后台{% endblock %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-tags"></i> 分类管理</h2>
        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 返回仪表盘
        </a>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header fw-bold">新增分类</div>
                <div class="card-body">
                    <form method="post" action="{{ url_for('admin.category_new') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label">分类名称</label>
                            <input type="text" name="name" class="form-control" placeholder="例如：纪录片" required maxlength="32">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> 添加分类
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card">
                <div class="card-header fw-bold">
                    现有分类 <span class="badge bg-primary">{{ categories|length }}</span>
                </div>
                <div class="card-body p-0">
                    {% if categories %}
                    <ul class="list-group list-group-flush">
                        {% for cat in categories %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div>
                                <strong>{{ cat.name }}</strong>
                                <span class="badge bg-secondary ms-2">{{ cat.movies.count() }} 部影视</span>
                            </div>
                            <form method="post" action="{{ url_for('admin.category_delete', cat_id=cat.id) }}"
                                  onsubmit="return confirm('确定要删除分类「{{ cat.name }}」吗？');">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        {% if cat.movies.count() > 0 %}disabled title="该分类下有影视，无法删除"{% endif %}>
                                    <i class="bi bi-trash"></i> 删除
                                </button>
                            </form>
                        </li>
                        {% endfor %}
                    </ul>
                    {% else %}
                    <p class="text-muted text-center p-3 mb-0">暂无分类</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
